<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Attendance — PawnPilots Academy</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="../../favicon-32.png" sizes="32x32" type="image/png" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../../firebase-config.js?v=3"></script>
  <style>
    :root {
      --bg: #fffbf5;
      --paper: #fff8ef;
      --ink: #1a1209;
      --muted: #7a6a5a;
      --warm: #f5ead8;
      --walnut: #5a3925;
      --walnut-deep: #2e1b12;
      --felt: #2f7a54;
      --gold: #c4862e;
      --red: #c44a2e;
      --line: rgba(90,57,37,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 15px rgba(50,28,14,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      background: var(--walnut-deep);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      color: #fff;
      border-bottom: 2px solid var(--gold);
    }
    .brand { font-family: 'Baloo 2'; font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .brand img { width: 24px; border-radius: 6px; }
    .header-actions button {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'Outfit';
      font-size: 0.8rem;
      cursor: pointer;
    }
    .header-actions button:hover { background: rgba(255,255,255,0.2); }

    /* Container */
    .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }

    /* Cards */
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .card-title {
      font-family: 'Baloo 2';
      font-size: 1.4rem;
      color: var(--walnut-deep);
      margin-bottom: 8px;
    }
    .card-subtitle { font-size: 0.9rem; color: var(--muted); margin-bottom: 20px; }

    /* Forms & Inputs */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--walnut); margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-family: 'Outfit';
      font-size: 0.95rem;
      background: #fff;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--gold); }
    .form-group textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      font-family: 'Outfit'; font-size: 0.95rem; background: #fff; outline: none; resize: vertical;
    }
    .form-group textarea:focus { border-color: var(--gold); }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: 'Outfit';
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--gold); color: #fff; }
    .btn-primary:hover { background: #b37320; }
    .btn-secondary { background: var(--warm); color: var(--walnut-deep); border: 1px solid var(--line); }
    .btn-secondary:hover { background: #ecdac1; }
    .btn-success { background: var(--felt); color: #fff; }
    .btn-success:hover { background: #256b46; }
    .btn-danger { background: var(--red); color: #fff; font-size: 0.8rem; padding: 6px 12px; }
    .btn-danger:hover { background: #a83d24; }
    .btn-sm { font-size: 0.8rem; padding: 6px 14px; }

    /* Setup Screen */
    #setupScreen { display: none; max-width: 500px; margin: 60px auto; }
    .setup-steps { margin-bottom: 24px; font-size: 0.9rem; color: var(--muted); line-height: 1.5; }
    .setup-steps ol { padding-left: 20px; margin-top: 10px; }
    .setup-steps li { margin-bottom: 8px; }

    /* Dashboard */
    #dashboardScreen { display: none; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }

    /* Month Nav */
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .month-nav button {
      background: var(--warm); border: 1px solid var(--line); border-radius: 6px; padding: 8px 14px;
      font-family: 'Outfit'; font-weight: 600; cursor: pointer; font-size: 1rem; color: var(--walnut-deep);
    }
    .month-nav button:hover { background: #ecdac1; }
    .month-nav .month-label {
      font-family: 'Baloo 2'; font-size: 1.3rem; font-weight: 700; color: var(--walnut-deep); min-width: 180px; text-align: center;
    }

    /* Day Toggle Buttons */
    .day-toggles { display: flex; gap: 6px; flex-wrap: wrap; }
    .day-toggle {
      width: 48px; height: 44px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-family: 'Outfit'; font-weight: 600; font-size: 0.8rem;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      user-select: none;
    }
    .day-toggle:hover { border-color: var(--gold); }
    .day-toggle.active {
      background: var(--gold); color: #fff; border-color: var(--gold);
      box-shadow: 0 2px 8px rgba(196,134,46,0.3);
    }

    /* Student Cards */
    .student-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .student-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }
    .student-info h3 { font-size: 1.1rem; color: var(--walnut-deep); font-weight: 700; margin-bottom: 2px; }
    .student-info .student-meta { font-size: 0.8rem; color: var(--muted); font-family: monospace; }
    .student-info .student-schedule {
      font-size: 0.85rem; color: var(--gold); font-weight: 600; margin-top: 4px;
    }
    .student-info .student-schedule .tz-convert {
      color: var(--felt); font-weight: 500; margin-left: 6px;
    }
    .student-link {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .student-link a {
      font-size: 0.8rem; color: var(--walnut); text-decoration: none;
      background: var(--warm); padding: 4px 10px; border-radius: 6px;
      font-family: monospace; word-break: break-all; transition: all 0.15s;
    }
    .student-link a:hover { background: #ecdac1; color: var(--walnut-deep); }
    .copy-btn {
      background: var(--gold); color: #fff; border: none; border-radius: 6px;
      padding: 4px 10px; font-family: 'Outfit'; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .student-card-actions { display: flex; gap: 6px; }

    /* Session Grid inside student card */
    .session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0;
    }
    .session-cell {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 6px;
    }
    .session-cell .session-date {
      font-weight: 600; font-size: 0.9rem; color: var(--walnut-deep);
    }
    .session-cell .session-day {
      font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .session-cell select {
      width: 100%; padding: 6px 8px;
      border: 1px solid var(--line); border-radius: 6px;
      font-family: 'Outfit'; font-weight: 600; font-size: 0.82rem;
      cursor: pointer; outline: none; background: #fff;
    }
    .session-cell select.status-p { color: var(--felt); background: rgba(47,122,84,0.08); border-color: rgba(47,122,84,0.25); }
    .session-cell select.status-a { color: var(--red); background: rgba(196,74,46,0.08); border-color: rgba(196,74,46,0.25); }

    .edit-session-btn {
      background: none; border: none; cursor: pointer; font-size: 0.8rem; opacity: 0.5; transition: opacity 0.2s;
    }
    .edit-session-btn:hover { opacity: 1; }

    .no-sessions { padding: 20px; text-align: center; color: var(--muted); font-size: 0.9rem; }

    /* Add Student Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--paper); border-radius: var(--radius); padding: 28px;
      width: 90%; max-width: 440px; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-family: 'Baloo 2'; font-size: 1.3rem; color: var(--walnut-deep); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-state h3 { font-family: 'Baloo 2'; font-size: 1.2rem; color: var(--walnut); margin-bottom: 8px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--walnut-deep); color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-weight: 500; font-size: 0.9rem;
      opacity: 0; transform: translateY(20px);
      transition: all 0.3s; pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Inline form rows */
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    @media (max-width: 600px) {
      .top-bar { flex-direction: column; align-items: stretch; }
      .month-nav { justify-content: center; }
      .session-grid { grid-template-columns: 1fr 1fr; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="brand">
      <img src="../../favicon-192.png" alt="PawnPilots" />
      <span>Admin Attendance</span>
    </div>
    <div class="header-actions" id="headerActions" style="display:none;">
      <button onclick="ppAuth.signOut()">Logout</button>
    </div>
  </div>

  <div class="container">
    
    <!-- SETUP SCREEN (DEPRECATED — Firebase Auth replaces this) -->
    <!--
    <div id="setupScreen" class="card">
      <h2 class="card-title">Setup Database</h2>
      <p>This screen has been replaced by Firebase Auth. Please use the login page.</p>
    </div>
    -->

    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen">
      
      <div class="top-bar">
        <div id="authorActions" style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary" onclick="showAddStudentModal()">+ Add Student</button>
          <button class="btn btn-secondary" onclick="showAddRecapModal()">+ Add Recap</button>
          <button class="btn btn-success" onclick="saveData()">💾 Save to Database</button>
        </div>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">←</button>
          <div class="month-label" id="monthLabel">March 2026</div>
          <button onclick="changeMonth(1)">→</button>
        </div>
      </div>

      <div id="studentList">
        <!-- Rendered via JS -->
      </div>

    </div>
  </div>

  <!-- ADD / EDIT STUDENT MODAL -->
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <h2 id="modalTitle">Add Student</h2>
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" id="modalName" placeholder="e.g. Shashank" />
      </div>
      <div class="form-group" id="tokenGroup" style="display:none;">
        <label>Link ID (token)</label>
        <input type="text" id="modalToken" placeholder="e.g. ianna-73mh" style="font-family:monospace;" />
        <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">Changing this will update the student's attendance link.</div>
      </div>
      <div class="form-group">
        <label>Session Days</label>
        <div class="day-toggles" id="modalDays">
          <div class="day-toggle" data-day="1" onclick="toggleDay(this)">Mon</div>
          <div class="day-toggle" data-day="2" onclick="toggleDay(this)">Tue</div>
          <div class="day-toggle" data-day="3" onclick="toggleDay(this)">Wed</div>
          <div class="day-toggle" data-day="4" onclick="toggleDay(this)">Thu</div>
          <div class="day-toggle" data-day="5" onclick="toggleDay(this)">Fri</div>
          <div class="day-toggle" data-day="6" onclick="toggleDay(this)">Sat</div>
          <div class="day-toggle" data-day="0" onclick="toggleDay(this)">Sun</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Session Time</label>
          <select id="modalTime"></select>
        </div>
        <div class="form-group">
          <label>Student's Timezone</label>
          <select id="modalTimezone"></select>
        </div>
      </div>
      <div class="form-group">
        <label>Lichess Username</label>
        <input type="text" id="modalLichess" placeholder="e.g. Aarvi-CT" />
      </div>
      <div class="form-group">
        <label>Chess.com Username</label>
        <input type="text" id="modalChesscom" placeholder="e.g. I_Bang_the_Drum" />
      </div>
      <div class="form-group">
        <label>Parent Username (for login)</label>
        <input type="text" id="modalParentUsername" placeholder="e.g. aarvi (auto-creates login)" />
        <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">Creates a login at username@pawnpilots.com. Leave blank to skip.</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modalSaveBtn" onclick="saveStudent()">Add Student</button>
      </div>
    </div>
  </div>

  <!-- SESSION DETAILS MODAL -->
  <div class="modal-overlay" id="sessionModal">
    <div class="modal">
      <h2 id="sessionModalTitle" style="font-family: 'Outfit'; font-size: 1.1rem; color: var(--muted); margin-bottom: 20px;">Session Details</h2>
      <div class="form-group">
        <label>Session Topic (Optional)</label>
        <input type="text" id="sessTopic" placeholder="e.g. Sicilian Defense" />
      </div>
      <div class="form-group">
        <label>Notes & Links (Markdown supported)</label>
        <textarea id="sessNotes" rows="3" placeholder="Notes for the student..."></textarea>
      </div>
      <div class="form-group">
        <label>Homework (Markdown supported)</label>
        <textarea id="sessHw" rows="3" placeholder="Homework assignment..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeSessionModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSessionDetails()">Save Details</button>
      </div>
    </div>
  </div>

  <!-- PLAN EDITOR MODAL -->
  <div class="modal-overlay" id="planModal">
    <div class="modal" style="max-width:720px; max-height:88vh; overflow-y:auto;">
      <h2 id="planModalTitle" style="font-family:'Outfit';font-size:1.1rem;color:var(--muted);margin-bottom:12px;">Curriculum Plan</h2>
      <div id="planProgressBar" style="display:none;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span id="planProgressLabel" style="font-size:0.78rem;font-weight:600;color:var(--walnut);">0/0 classes done</span>
          <span id="planProgressPct" style="font-size:0.78rem;color:var(--muted);">0%</span>
        </div>
        <div style="height:6px;background:var(--warm);border-radius:3px;overflow:hidden;">
          <div id="planProgressFill" style="height:100%;background:var(--felt);border-radius:3px;transition:width 0.3s;width:0%"></div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div class="form-group" style="margin-bottom:8px;">
          <label>Plan Title</label>
          <input id="planTitleInput" placeholder="e.g. 5-Month Accelerated Training Plan"/>
        </div>
        <div class="form-group" style="margin-bottom:8px;">
          <label>Pace</label>
          <input id="planPaceInput" placeholder="e.g. 2 classes/week — Tuesdays & Wednesdays"/>
        </div>
      </div>
      <div id="planEditorContent"></div>
      <div style="margin-top:12px;">
        <button class="btn btn-secondary btn-sm" onclick="addPlanMonth()">+ Add Month</button>
      </div>
      <div class="modal-actions" style="margin-top:20px;">
        <button class="btn btn-secondary" onclick="closePlanModal()">Cancel</button>
        <button class="btn btn-primary" onclick="savePlan()">Save Plan</button>
      </div>
    </div>
  </div>

  <style>
    .plan-editor-month { border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:12px; background:#fafafa; }
    .plan-editor-month h4 { margin:0 0 8px; font-size:0.92rem; display:flex; justify-content:space-between; align-items:center; }
    .plan-editor-month .plan-month-goal { font-size:0.8rem; color:var(--muted); font-style:italic; margin-bottom:8px; }
    .plan-editor-week { background:#fff; border:1px solid #eee; border-radius:6px; padding:12px; margin-bottom:8px; }
    .plan-editor-week label { font-size:0.78rem; font-weight:600; color:var(--muted); display:block; margin-bottom:2px; }
    .plan-editor-week input, .plan-editor-week textarea { width:100%; padding:6px 8px; border:1px solid #ddd; border-radius:4px; font-size:0.85rem; margin-bottom:6px; font-family:'Outfit',sans-serif; }
    .plan-editor-week textarea { resize:vertical; min-height:40px; }
    .plan-class-row { display:flex; gap:6px; align-items:center; margin-bottom:4px; }
    .plan-class-row input[type="checkbox"] { width:auto; margin:0; flex-shrink:0; cursor:pointer; accent-color:var(--felt); }
    .plan-class-row .plan-class-topic { flex:1; }
    .plan-class-row .plan-class-date { width:130px; flex-shrink:0; }
    .plan-class-row button { flex-shrink:0; background:#e74c3c; color:#fff; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:0.75rem; }
    .plan-class-done .plan-class-topic { text-decoration:line-through; opacity:0.55; }
    .plan-hw-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
    .plan-hw-row input[type="checkbox"] { width:auto; margin:0; flex-shrink:0; cursor:pointer; accent-color:var(--gold); }
    .plan-hw-row input[type="text"], .plan-hw-row input:not([type]) { flex:1; }
    .plan-hw-done input:not([type="checkbox"]) { text-decoration:line-through; opacity:0.55; }
    .plan-link-row { display:flex; gap:6px; margin-bottom:4px; }
    .plan-link-row input { flex:1; }
    .plan-link-row button { flex-shrink:0; background:#e74c3c; color:#fff; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:0.75rem; }
    .btn-xs { font-size:0.72rem; padding:3px 8px; }
  </style>

  <!-- ADD RECAP MODAL -->
  <div class="modal-overlay" id="recapModal">
    <div class="modal">
      <h2 style="font-family:'Baloo 2';font-size:1.3rem;color:var(--walnut-deep);margin-bottom:20px;">Add Session Recap</h2>
      <div class="form-group">
        <label>Student</label>
        <select id="recapStudent"></select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="recapDate" />
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="recapTitle" placeholder="e.g. Tactical Patterns" />
      </div>
      <div class="form-group">
        <label>Mood</label>
        <select id="recapMood">
          <option value="great">🔥 Great</option>
          <option value="good">👍 Good</option>
          <option value="ok">😐 OK</option>
          <option value="challenging">💪 Challenging</option>
          <option value="tough">😤 Tough</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bullet Points (one per line)</label>
        <textarea id="recapBullets" rows="4" placeholder="Learned pin tactics\nSolved 5 puzzles"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeRecapModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveRecap()">Add Recap</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Saved!</div>

  <script>
    // =====================================================
    // CONFIG
    // =====================================================
    const ADMIN_TZ = 'Asia/Kolkata';
    const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const TIMEZONES = [
      { label: 'US Eastern (ET)',   value: 'America/New_York' },
      { label: 'US Central (CT)',   value: 'America/Chicago' },
      { label: 'US Pacific (PT)',   value: 'America/Los_Angeles' },
      { label: 'UK (GMT/BST)',      value: 'Europe/London' },
      { label: 'India (IST)',       value: 'Asia/Kolkata' },
      { label: 'Australia East',    value: 'Australia/Sydney' },
      { label: 'New Zealand',       value: 'Pacific/Auckland' },
      { label: 'Dubai (GST)',       value: 'Asia/Dubai' },
      { label: 'Singapore (SGT)',   value: 'Asia/Singapore' },

          const val = hh + ':' + mm;

    // =====================================================
    // DATA LOAD / SAVE (Firestore)
    // =====================================================
    async function loadData() {
      try {
        // Load all students
        const studentsSnap = await ppDB.collection('students').get();
        db.students = [];
        db.attendance = {};

        const attPromises = [];
        studentsSnap.forEach(doc => {
          const stu = doc.data();
          stu._docId = doc.id; // store Firestore doc ID
          db.students.push(stu);
          
          // Load attendance subcollection for this student (current month range)
          const p = ppDB.collection('students').doc(doc.id).collection('attendance').get()
            .then(attSnap => {
              db.attendance[stu.token] = {};
              attSnap.forEach(adoc => {
                db.attendance[stu.token][adoc.id] = adoc.data();
              });
            });
          attPromises.push(p);
        });

        await Promise.all(attPromises);

        document.getElementById('dashboardScreen').style.display = 'block';
      } catch (err) {
        console.error('Error loading data:', err);
        alert('Error loading data from Firestore. Check console.');
      }
    }

    async function saveData(isInit = false) {
      syncDOMtoDB();

      const btn = document.querySelector('.btn-success');
      if (btn) btn.textContent = 'Saving...';

      try {
        const batch = ppDB.batch();

        // Save each student doc
        db.students.forEach(stu => {
          const docId = stu._docId || stu.token;
          const ref = ppDB.collection('students').doc(docId);
          const stuData = Object.assign({}, stu);
          delete stuData._docId; // don't store internal field
          batch.set(ref, stuData, { merge: true });
        });

        // Save attendance subcollection docs
        Object.keys(db.attendance).forEach(token => {
          const dates = db.attendance[token];
          Object.keys(dates).forEach(dateStr => {
            const ref = ppDB.collection('students').doc(token).collection('attendance').doc(dateStr);
            batch.set(ref, dates[dateStr]);
          });
        });

        await batch.commit();
        if (!isInit) showToast('Saved to database!');
        hasUnsavedDropdowns = false;
      } catch (err) {
        console.error('Save error:', err);
        alert('Failed to save data to Firestore.');
      } finally {
        if (btn) btn.textContent = '💾 Save to Database';
      }
    }

    function syncDOMtoDB() {
      document.querySelectorAll('.att-select').forEach(sel => {
        const token = sel.dataset.stu;
        const date = sel.dataset.date;
        if (!db.attendance[token]) db.attendance[token] = {};
        
        let existing = db.attendance[token][date] || {};
        if (typeof existing === 'string') existing = { status: existing };
        
        if (sel.value) {
          existing.status = sel.value;
          db.attendance[token][date] = existing;
        } else {
          existing.status = '';
          if (!existing.notes && !existing.hw && !existing.topic) {
             delete db.attendance[token][date];
          } else {
             db.attendance[token][date] = existing;
          }
        }
      });
    }

      let total = 0, done = 0;
      p.months.forEach(m => (m.weeks || []).forEach(w => (w.classes || []).forEach(c => { total++; if (c.done) done++; })));

      const pct = Math.round(done / total * 100);
      const color = pct === 100 ? '#2f7a54' : pct > 0 ? '#c4862e' : '#999';
      return ' <span style="font-size:0.7rem;color:' + color + ';font-weight:700;">' + done + '/' + total + '</span>';

    // =====================================================
    // SESSION DATE GENERATION
    // =====================================================
    function getSessionDates(days, year, month) {
      // Returns array of "YYYY-MM-DD" strings for all matching weekdays in the given month
      const dates = [];
      if (!days || days.length === 0) return dates;
      
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        if (days.includes(date.getDay())) {
          const yyyy = date.getFullYear();
          const mm = String(date.getMonth() + 1).padStart(2, '0');
          const dd = String(date.getDate()).padStart(2, '0');
          dates.push(`${yyyy}-${mm}-${dd}`);
        }
      }
      return dates;
    }

    // =====================================================
    // TIMEZONE CONVERSION
    // =====================================================
    function convertTime(time24, fromTZ, toTZ) {
      // time24 = "HH:MM"
      try {
        const [h, m] = time24.split(':').map(Number);
        // Use current date to reflect active daylight saving time
        const now = new Date();
        const ref = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
        
        // Get UTC offset for both timezones
        const fromStr = ref.toLocaleString('en-US', { timeZone: fromTZ });
        const toStr = ref.toLocaleString('en-US', { timeZone: toTZ });
        
        // Parse both
        const fromDate = new Date(fromStr);
        const toDate = new Date(toStr);
        
        // Difference in minutes
        const diff = (toDate - fromDate) / 60000;
        
        // Apply difference
        let totalMin = h * 60 + m + diff;
        // Normalize
        while (totalMin < 0) totalMin += 1440;
        totalMin = totalMin % 1440;
        
        const newH = Math.floor(totalMin / 60);
        const newM = totalMin % 60;
        return formatTime12(String(newH).padStart(2, '0') + ':' + String(newM).padStart(2, '0'));
      } catch (e) {
        return time24;
      }
    }

    function formatTime12(time24) {
      const [h, m] = time24.split(':').map(Number);
      const suffix = h < 12 ? 'AM' : 'PM';
      const display = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return display + ':' + String(m).padStart(2, '0') + ' ' + suffix;
    }

    function saveStudent() {
      const name = document.getElementById('modalName').value.trim();
      if (!name) return alert('Please enter a student name.');

      const days = [];
      document.querySelectorAll('.day-toggle.active').forEach(d => {
        days.push(parseInt(d.dataset.day));
      });
      if (days.length === 0) return alert('Please select at least one day.');

      const time = document.getElementById('modalTime').value;
      const timezone = document.getElementById('modalTimezone').value;
      const lichessUsername = (document.getElementById('modalLichess').value || '').trim();
      const chesscomUsername = (document.getElementById('modalChesscom').value || '').trim();
      const parentUsername = (document.getElementById('modalParentUsername').value || '').trim();

      if (editingStudentIndex >= 0) {
        // Editing existing — check if token changed
        const oldToken = db.students[editingStudentIndex].token;
        const newToken = document.getElementById('modalToken').value.trim() || oldToken;
        
        if (newToken !== oldToken) {
          if (db.attendance[oldToken]) {
            db.attendance[newToken] = db.attendance[oldToken];
            delete db.attendance[oldToken];
          }
        }
        
        db.students[editingStudentIndex].token = newToken;
        db.students[editingStudentIndex].name = name;
        db.students[editingStudentIndex].days = days;
        db.students[editingStudentIndex].time = time;
        db.students[editingStudentIndex].timezone = timezone;
        db.students[editingStudentIndex].lichessUsername = lichessUsername;
        db.students[editingStudentIndex].chesscomUsername = chesscomUsername;
      } else {
        // Adding new
        const rand = Math.random().toString(36).substring(2, 6);
        const token = name.split(' ')[0].toLowerCase() + '-' + rand;
        db.students.push({
          token, name, days, time, timezone,
          lichessUsername, chesscomUsername,
          recaps: [], puzzles: [], puzzleSolves: [],
          badges: [], stats: {}, plan: null, h2h: null,
          _docId: token
        });
      }

      closeModal();
      renderDashboard();
      saveData();
    }

      const stu = db.students[idx];

      // Remove attendance

      // Remove student
      db.students.splice(idx, 1);
      renderDashboard();
      saveData(); // auto-save to JSONBin

      let total = 0, done = 0;
      planEditData.months.forEach(m => {
        (m.weeks || []).forEach(w => {
          (w.classes || []).forEach(c => { total++; if (c.done) done++; });
        });
      });
      const bar = document.getElementById('planProgressBar');
      if (total === 0) { bar.style.display = 'none'; return; }
      bar.style.display = 'block';
      const pct = Math.round(done / total * 100);
      document.getElementById('planProgressLabel').textContent = done + '/' + total + ' classes done';
      document.getElementById('planProgressPct').textContent = pct + '%';
      document.getElementById('planProgressFill').style.width = pct + '%';

            const doneClass = cls.done ? ' plan-class-done' : '';
            html += `<div class="plan-class-row${doneClass}">`;
            html += `<input type="checkbox" ${cls.done?'checked':''} onchange="planEditData.months[${mi}].weeks[${wi}].classes[${ci}].done=this.checked; renderPlanEditor()"/>`;
            html += `<input class="plan-class-topic" value="${escHtml(cls.topic||'')}" onchange="planEditData.months[${mi}].weeks[${wi}].classes[${ci}].topic=this.value" placeholder="Class topic"/>`;
            html += `<input class="plan-class-date" type="date" value="${cls.date||''}" onchange="planEditData.months[${mi}].weeks[${wi}].classes[${ci}].date=this.value"/>`;
            html += `<button onclick="removePlanClass(${mi},${wi},${ci})">×</button>`;
            html += `</div>`;
          });
          html += `<button class="btn btn-secondary btn-xs" style="margin-top:2px;" onclick="addPlanClass(${mi},${wi})">+ Class</button>`;

          // Homework
          const hw = week.homework || { text: '', done: false };
          const hwDoneClass = hw.done ? ' plan-hw-done' : '';
          html += `<label style="margin-top:8px;">Homework</label>`;
          html += `<div class="plan-hw-row${hwDoneClass}">`;
          html += `<input type="checkbox" ${hw.done?'checked':''} onchange="ensureHw(${mi},${wi}); planEditData.months[${mi}].weeks[${wi}].homework.done=this.checked; renderPlanEditor()"/>`;
          html += `<input value="${escHtml(hw.text||'')}" onchange="ensureHw(${mi},${wi}); planEditData.months[${mi}].weeks[${wi}].homework.text=this.value" placeholder="Homework description"/>`;
          html += `</div>`;

          // Links
          html += `<label style="margin-top:8px;">Study Links</label>`;
          (week.links || []).forEach((lnk, li) => {
            html += `<div class="plan-link-row">`;
            html += `<input value="${escHtml(lnk.text||'')}" onchange="planEditData.months[${mi}].weeks[${wi}].links[${li}].text=this.value" placeholder="Link label"/>`;
            html += `<input value="${escHtml(lnk.url||'')}" onchange="planEditData.months[${mi}].weeks[${wi}].links[${li}].url=this.value" placeholder="https://lichess.org/..."/>`;
            html += `<button onclick="removePlanLink(${mi},${wi},${li})">×</button></div>`;
          });
          html += `<button class="btn btn-secondary btn-xs" style="margin-top:4px;" onclick="addPlanLink(${mi},${wi})">+ Link</button>`;

          html += `</div>`;
        });
        html += `<button class="btn btn-secondary btn-xs" style="margin-top:6px;" onclick="addPlanWeek(${mi})">+ Add Week</button>`;
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    function ensureHw(mi, wi) {
      if (!planEditData.months[mi].weeks[wi].homework) planEditData.months[mi].weeks[wi].homework = { text: '', done: false };
    }

    function addPlanMonth() {
      planEditData.months.push({ name: '', goal: '', weeks: [{ label: 'Week 1', classes: [{ topic: '', done: false }], homework: { text: '', done: false }, links: [] }] });
      renderPlanEditor();
    }

    function removePlanMonth(mi) {
      planEditData.months.splice(mi, 1);
      renderPlanEditor();
    }

    function addPlanWeek(mi) {
      if (!planEditData.months[mi].weeks) planEditData.months[mi].weeks = [];
      const n = planEditData.months[mi].weeks.length + 1;
      planEditData.months[mi].weeks.push({ label: 'Week ' + n, classes: [{ topic: '', done: false }], homework: { text: '', done: false }, links: [] });
      renderPlanEditor();
    }

    function removePlanWeek(mi, wi) {
      planEditData.months[mi].weeks.splice(wi, 1);
      renderPlanEditor();
    }

    function addPlanClass(mi, wi) {
      if (!planEditData.months[mi].weeks[wi].classes) planEditData.months[mi].weeks[wi].classes = [];
      planEditData.months[mi].weeks[wi].classes.push({ topic: '', done: false });
      renderPlanEditor();
    }

    function removePlanClass(mi, wi, ci) {
      planEditData.months[mi].weeks[wi].classes.splice(ci, 1);
      renderPlanEditor();
    }

    function addPlanLink(mi, wi) {
      if (!planEditData.months[mi].weeks[wi].links) planEditData.months[mi].weeks[wi].links = [];
      planEditData.months[mi].weeks[wi].links.push({ text: '', url: '' });
      renderPlanEditor();
    }

    function removePlanLink(mi, wi, li) {
      planEditData.months[mi].weeks[wi].links.splice(li, 1);
      renderPlanEditor();
    }

    function savePlan() {
      planEditData.title = document.getElementById('planTitleInput').value;
      planEditData.pace = document.getElementById('planPaceInput').value;
      db.students[planEditIdx].plan = planEditData;
      closePlanModal();
      showToast('Plan saved!');
      saveData();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // =====================================================
    // ADD RECAP MODAL
    // =====================================================
    function showAddRecapModal() {
      const sel = document.getElementById('recapStudent');
      sel.innerHTML = '';
      db.students.forEach((stu, idx) => {
        sel.innerHTML += `<option value="${idx}">${stu.name}</option>`;
      });
      document.getElementById('recapDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('recapTitle').value = '';
      document.getElementById('recapMood').value = 'good';
      document.getElementById('recapBullets').value = '';
      document.getElementById('recapModal').classList.add('show');
    }

    function closeRecapModal() {
      document.getElementById('recapModal').classList.remove('show');
    }

    async function saveRecap() {
      const idx = parseInt(document.getElementById('recapStudent').value);
      const stu = db.students[idx];
      if (!stu) return alert('Please select a student.');

      const date = document.getElementById('recapDate').value;
      const title = document.getElementById('recapTitle').value.trim();
      const mood = document.getElementById('recapMood').value;
      const bulletsRaw = document.getElementById('recapBullets').value.trim();

      if (!date || !title) return alert('Please enter a date and title.');

      const bullets = bulletsRaw ? bulletsRaw.split('\n').map(b => b.trim()).filter(b => b) : [];

      const recap = { date, title, mood, bullets };

      // Add to local state
      if (!stu.recaps) stu.recaps = [];
      stu.recaps.push(recap);

      // Save to Firestore
      const docId = stu._docId || stu.token;
      try {
        await ppDB.collection('students').doc(docId).update({
          recaps: firebase.firestore.FieldValue.arrayUnion(recap)
        });
        showToast('Recap added for ' + stu.name + '!');
      } catch (e) {
        console.error('Failed to save recap:', e);
        alert('Failed to save recap.');
      }

      closeRecapModal();
    }

    // =====================================================
    // TOAST & CLIPBOARD
    // =====================================================
    function copyLink(token, btn) {
      const url = 'https://pawnpilots.com/attendance/?t=' + token;
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        btn.style.background = '#2f7a54';
        setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = ''; }, 2000);
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // =====================================================
    // BEFOREUNLOAD WARNING
    // =====================================================
    window.addEventListener('beforeunload', function(e) {
      if (hasUnsavedDropdowns) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // =====================================================
    // GO
    // =====================================================
    init();
  </script>
</body>
</html>
